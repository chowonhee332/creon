<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loader Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 60px 20px; }
    h1 { font-size: 18px; color: #333; }
    .row { display: flex; gap: 40px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .card {
      background: white;
      border-radius: 20px;
      width: 240px; height: 160px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .label { font-size: 13px; color: #888; }
    .size-label { font-size: 11px; color: #aaa; }
    a { color: #2563EB; font-size: 14px; }

    .logo-68 { width: 68px; height: auto; }
    .logo-48 { width: 48px; height: auto; }
    .logo-static { width: 68px; height: auto; }

    .ll-path {
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      animation: ll-draw 2.6s ease-in-out infinite;
    }
    @keyframes ll-draw {
      0%   { stroke-dashoffset: 1; opacity: 1; }
      60%  { stroke-dashoffset: 0; opacity: 1; }
      80%  { stroke-dashoffset: 0; opacity: 0; }
      100% { stroke-dashoffset: 1; opacity: 0; }
    }
  </style>
</head>
<body>
  <h1>Loader Animation Test</h1>
  <a href="index.html">← 메인으로 돌아가기</a>

  <div class="row">

    <!-- Card 1: Static -->
    <div>
      <div class="card">
        <svg class="logo-static" viewBox="0 0 189 132" xmlns="http://www.w3.org/2000/svg" fill="none">
          <defs>
            <linearGradient id="s-g" x1="20" y1="118" x2="180" y2="18" gradientUnits="userSpaceOnUse">
              <stop stop-color="#0040D8"/><stop offset="1" stop-color="#48BBFF"/>
            </linearGradient>
          </defs>
          <path stroke="url(#s-g)" stroke-width="35" stroke-linecap="round"
            d="M17.6664 113.096C17.0164 100.926 18.0964 88.1461 24.0464 77.2661C29.4364 67.4061 39.3064 60.5961 49.5764 56.5661C62.9464 51.3161 79.0364 48.8461 93.0164 53.6561C109.476 59.3161 119.596 76.1561 117.786 93.4061C117.046 100.496 114.096 107.896 107.666 111.566C100.386 115.726 91.0164 114.766 83.7264 111.156C82.0764 110.336 80.4964 109.376 79.0364 108.256C72.7564 103.476 68.2364 96.6561 65.1964 89.3661C58.1864 72.5361 58.7364 52.2561 70.4464 37.6861C79.8264 26.0161 94.4464 19.1961 109.196 17.7761C118.246 16.9061 127.556 18.0661 135.966 21.5861C146.916 26.1761 155.546 34.9861 161.626 45.0361C167.706 55.0861 170.956 70.7261 170.956 79.9461"/>
        </svg>
        <span class="label">Static (shape)</span>
      </div>
      <div class="size-label" style="text-align:center; margin-top:8px;">렌더링 확인용</div>
    </div>

    <!-- Card 2: Animated 68px -->
    <div>
      <div class="card">
        <svg class="logo-68" viewBox="0 0 189 132" xmlns="http://www.w3.org/2000/svg" fill="none">
          <defs>

              <stop stop-color="#0040D8"/><stop offset="1" stop-color="#48BBFF"/>
            </linearGradient>
          </defs>
          <path class="ll-path" stroke="url(#a-g)" stroke-width="35" stroke-linecap="round" pathLength="1"
            d="M17.6664 113.096C17.0164 100.926 18.0964 88.1461 24.0464 77.2661C29.4364 67.4061 39.3064 60.5961 49.5764 56.5661C62.9464 51.3161 79.0364 48.8461 93.0164 53.6561C109.476 59.3161 119.596 76.1561 117.786 93.4061C117.046 100.496 114.096 107.896 107.666 111.566C100.386 115.726 91.0164 114.766 83.7264 111.156C82.0764 110.336 80.4964 109.376 79.0364 108.256C72.7564 103.476 68.2364 96.6561 65.1964 89.3661C58.1864 72.5361 58.7364 52.2561 70.4464 37.6861C79.8264 26.0161 94.4464 19.1961 109.196 17.7761C118.246 16.9061 127.556 18.0661 135.966 21.5861C146.916 26.1761 155.546 34.9861 161.626 45.0361C167.706 55.0861 170.956 70.7261 170.956 79.9461"/>
        </svg>
        <span class="label">Generating icon</span>
      </div>
      <div class="size-label" style="text-align:center; margin-top:8px;">68px · 단일 라인 드로잉</div>
    </div>

    <!-- Card 3: Animated 48px -->
    <div>
      <div class="card">
        <svg class="logo-48" viewBox="0 0 189 132" xmlns="http://www.w3.org/2000/svg" fill="none">
          <defs>
            <linearGradient id="b-g" x1="20" y1="118" x2="180" y2="18" gradientUnits="userSpaceOnUse">
              <stop stop-color="#0040D8"/><stop offset="1" stop-color="#48BBFF"/>
            </linearGradient>
          </defs>
          <path class="ll-path" stroke="url(#b-g)" stroke-width="35" stroke-linecap="round" pathLength="1"
            d="M17.6664 113.096C17.0164 100.926 18.0964 88.1461 24.0464 77.2661C29.4364 67.4061 39.3064 60.5961 49.5764 56.5661C62.9464 51.3161 79.0364 48.8461 93.0164 53.6561C109.476 59.3161 119.596 76.1561 117.786 93.4061C117.046 100.496 114.096 107.896 107.666 111.566C100.386 115.726 91.0164 114.766 83.7264 111.156C82.0764 110.336 80.4964 109.376 79.0364 108.256C72.7564 103.476 68.2364 96.6561 65.1964 89.3661C58.1864 72.5361 58.7364 52.2561 70.4464 37.6861C79.8264 26.0161 94.4464 19.1961 109.196 17.7761C118.246 16.9061 127.556 18.0661 135.966 21.5861C146.916 26.1761 155.546 34.9861 161.626 45.0361C167.706 55.0861 170.956 70.7261 170.956 79.9461"/>
        </svg>
        <span class="label">Generating icon</span>
      </div>
      <div class="size-label" style="text-align:center; margin-top:8px;">48px · 단일 라인 드로잉</div>
    </div>

  </div>

  <p style="font-size:12px; color:#999;">Card 1이 안 보이면 SVG 경로 문제 / Card 2·3이 안 보이면 CSS 애니메이션 문제</p>
</body>
</html>
